<!DOCTYPE html>
<html>
<head>
    <title>Driver Panel - Smart Bus Tracker</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="driver-body">

<div class="driver-page">
    <div class="icon-badge">🚍</div>
    <h1>Driver Panel</h1>
    <p style="color:#6b7280;font-size:0.9rem;margin-bottom:20px;">Enter your bus number and start sharing your live location with passengers.</p>

    <input
        id="busId"
        placeholder="Bus Number (e.g. 12)"
    />

    <button id="startBtn" style="width:100%">
    Start Tracking
    </button>

    <p id="status">
    Location not started
    </p>

    <button onclick="logoutUser()" class="logout-link" style="width:100%">Logout</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/driver.js"></script>

</body>
</html>
