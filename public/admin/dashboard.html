<!DOCTYPE html>
<html>
<head>
    <title>Dashboard – Bus Tracker Admin</title>
    <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
<div id="nav"></div>
<main class="container">
    <div class="page-header">
        <div class="page-icon">📊</div>
        <div class="page-title">
            <h1>Dashboard</h1>
            <p>System overview at a glance</p>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon">👥</div>
            <span class="stat-value" id="totalUsers">–</span>
            <span class="stat-label">Total Users</span>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🧑‍✈️</div>
            <span class="stat-value" id="totalDrivers">–</span>
            <span class="stat-label">Drivers</span>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🎫</div>
            <span class="stat-value" id="totalPassengers">–</span>
            <span class="stat-label">Passengers</span>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🔑</div>
            <span class="stat-value" id="totalAdmins">–</span>
            <span class="stat-label">Admins</span>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🚌</div>
            <span class="stat-value" id="totalBuses">–</span>
            <span class="stat-label">Total Buses</span>
        </div>
        <div class="stat-card">
            <div class="stat-icon">✅</div>
            <span class="stat-value" id="activeBuses">–</span>
            <span class="stat-label">Active Buses</span>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🗺️</div>
            <span class="stat-value" id="totalRoutes">–</span>
            <span class="stat-label">Routes</span>
        </div>
    </div>
</main>
<script src="/admin/js/common.js"></script>
<script src="/admin/js/dashboard.js"></script>
<script>document.addEventListener("DOMContentLoaded",()=>renderNav("dashboard.html"));</script>
</body>
</html>
