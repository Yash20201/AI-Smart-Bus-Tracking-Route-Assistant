<!DOCTYPE html>
<html>
<head>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%F0%9F%9A%8C</text></svg>">
    <title>Trips – Bus Tracker Admin</title>
    <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
<div id="nav"></div>
<main class="container">
    <div class="page-header">
        <div class="page-icon">📍</div>
        <div class="page-title">
            <h1>Trips</h1>
            <p>Schedule and manage bus trips</p>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <div class="card-icon">➕</div>
            <h2>Schedule New Trip</h2>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Bus</label>
                <select id="tripBusId"></select>
            </div>
            <div class="form-group">
                <label>Route</label>
                <select id="tripRouteId"></select>
            </div>
            <div class="form-group">
                <label>Driver</label>
                <select id="tripDriverId"></select>
            </div>
            <button class="btn btn-primary" onclick="createTrip()">➕ Create Trip</button>
        </div>
    </div>

    <div class="table-wrap">
        <div class="table-toolbar">
            <h3>All Trips</h3>
            <span class="table-count" id="tripCount">0</span>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Bus</th>
                    <th>Route</th>
                    <th>Driver</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tripTableBody"></tbody>
        </table>
    </div>
</main>
<script src="/admin/js/common.js"></script>
<script src="/admin/js/trips.js"></script>
<script>document.addEventListener("DOMContentLoaded",()=>renderNav("trips.html"));</script>
</body>
</html>
