<!DOCTYPE html>
<html>
<head>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%F0%9F%9A%8C</text></svg>">
    <title>Buses – Bus Tracker Admin</title>
    <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
<div id="nav"></div>
<main class="container">
    <div class="page-header">
        <div class="page-icon">🚌</div>
        <div class="page-title">
            <h1>Buses</h1>
            <p>Add buses, assign drivers and routes</p>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <div class="card-icon">➕</div>
            <h2>Add New Bus</h2>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Bus Number</label>
                <input id="busNumber" placeholder="e.g. 101">
            </div>
            <div class="form-group">
                <label>Bus Name</label>
                <input id="busName" placeholder="e.g. City Express">
            </div>
            <button class="btn btn-primary" onclick="createBus()">➕ Add Bus</button>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <div class="card-icon">🧑</div>
            <h2>Assign Driver to Bus</h2>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Bus</label>
                <select id="assignBusId"></select>
            </div>
            <div class="form-group">
                <label>Driver</label>
                <select id="assignDriverId"></select>
            </div>
            <button class="btn btn-primary" onclick="assignDriver()">Assign Driver</button>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <div class="card-icon">🗺️</div>
            <h2>Assign Route to Bus</h2>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Bus</label>
                <select id="routeBusId"></select>
            </div>
            <div class="form-group">
                <label>Route</label>
                <select id="routeSelectId"></select>
            </div>
            <button class="btn btn-primary" onclick="assignRoute()">Assign Route</button>
        </div>
    </div>

    <div class="table-wrap">
        <div class="table-toolbar">
            <h3>All Buses</h3>
            <input type="text" class="table-search" id="busSearch" placeholder="Search buses…" oninput="filterBuses(this.value)">
            <span class="table-count" id="busCount">0</span>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Number</th>
                    <th>Name</th>
                    <th>Driver</th>
                    <th>Route</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="busTableBody"></tbody>
        </table>
    </div>
</main>
<script src="/admin/js/common.js"></script>
<script src="/admin/js/buses.js"></script>
<script>document.addEventListener("DOMContentLoaded",()=>renderNav("buses.html"));</script>
</body>
</html>
