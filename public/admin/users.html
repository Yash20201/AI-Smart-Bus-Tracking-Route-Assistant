<!DOCTYPE html>
<html>
<head>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%F0%9F%9A%8C</text></svg>">
    <title>Users – Bus Tracker Admin</title>
    <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
<div id="nav"></div>
<main class="container">
    <div class="page-header">
        <div class="page-icon">👥</div>
        <div class="page-title">
            <h1>Users</h1>
            <p>All registered users across every role</p>
        </div>
    </div>

    <div class="table-wrap">
        <div class="table-toolbar">
            <h3>All Users</h3>
            <input type="text" class="table-search" id="userSearch" placeholder="Search users…" oninput="filterUsers(this.value)">
            <span class="table-count" id="userCount">0</span>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="userTableBody"></tbody>
        </table>
    </div>
</main>
<script src="/admin/js/common.js"></script>
<script src="/admin/js/users.js"></script>
<script>document.addEventListener("DOMContentLoaded",()=>renderNav("users.html"));</script>
</body>
</html>
