<!DOCTYPE html>
<html>
<head>

<title>Track Your Bus</title>

<link rel="stylesheet"
href="/vendor/leaflet/leaflet.css"/>

<link rel="stylesheet" href="/css/style.css">

<style>
* { box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, Arial, sans-serif;
}

.passenger-layout {
    display: flex;
    height: 100vh;
    width: 100vw;
}

#sidebar {
    width: 340px;
    flex-shrink: 0;
    background: #fff;
    border-right: 1px solid #e5e7eb;
    overflow-y: auto;
    padding: 18px;
}

#sidebar::-webkit-scrollbar { width: 7px; }
#sidebar::-webkit-scrollbar-thumb { background: #dcdfef; border-radius: 8px; }

#sidebar h2 {
    font-size: 1.2rem;
    margin: 4px 0 20px;
    background: linear-gradient(135deg, #4f46e5, #06b6d4);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 800;
}

#sidebar h3 {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 700;
    margin: 22px 0 10px;
}

.route-item {
    padding: 11px 13px;
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    font-size: 0.88rem;
    transition: all 0.15s;
}

.route-item:hover { background: #f8f9ff; border-color: #c7d2fe; }

.route-item.active {
    border-color: #4f46e5;
    background: #eef2ff;
    box-shadow: 0 2px 10px rgba(79,70,229,0.12);
}

.live-bus-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 12px;
    border-radius: 10px;
    background: #f0fdf4;
    border: 1px solid #d1fae5;
    margin-bottom: 7px;
    font-size: 0.85rem;
}

.live-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #16a34a;
    flex-shrink: 0;
    box-shadow: 0 0 0 3px rgba(22,163,74,0.18);
}

.live-bus-item strong { flex: 1; }

.eta-btn {
    background: #fff;
    border: 1px solid #d1fae5;
    color: #059669;
    font-size: 0.72rem;
    font-weight: 700;
    padding: 4px 9px;
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
}

.eta-btn:hover { background: #059669; color: #fff; }

.eta-result {
    font-size: 0.78rem;
    color: #374151;
    margin: -3px 0 7px 16px;
    padding: 6px 10px;
    background: #f9fafb;
    border-radius: 8px;
}

.empty-hint {
    color: #9ca3af;
    font-size: 0.83rem;
    line-height: 1.5;
}

/* AI Route Assistant card */
.ai-card {
    background: linear-gradient(150deg, #eef2ff, #ecfeff);
    border: 1px solid #ddd6fe;
    border-radius: 14px;
    padding: 16px;
    margin: 22px 0 6px;
}

.ai-title {
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 800;
    font-size: 0.88rem;
    margin-bottom: 3px;
}

.ai-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: linear-gradient(135deg, #4f46e5, #06b6d4);
    color: #fff;
    font-size: 0.62rem;
    font-weight: 800;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
}

.ai-sub {
    font-size: 0.76rem;
    color: #6b7280;
    margin-bottom: 12px;
}

.ai-card input {
    width: 100%;
    padding: 9px 11px;
    border: 1.5px solid #ddd6fe;
    border-radius: 8px;
    font-size: 0.85rem;
    margin-bottom: 8px;
    background: #fff;
}

.ai-card input:focus { outline: none; border-color: #4f46e5; }

.ai-card button {
    width: 100%;
    background: linear-gradient(135deg, #4f46e5, #06b6d4);
    color: #fff;
    border: none;
    padding: 10px;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.12s;
}

.ai-card button:hover { transform: translateY(-1px); }
.ai-card button:disabled { opacity: 0.6; cursor: default; transform: none; }

.ai-result {
    margin-top: 12px;
    font-size: 0.82rem;
    background: #fff;
    border-radius: 9px;
    padding: 11px 13px;
    border: 1px solid #e5e7eb;
    line-height: 1.5;
}

.ai-result .best {
    color: #4338ca;
    font-weight: 700;
}

#mapWrap {
    flex: 1;
    position: relative;
}

#map {
    height: 100%;
    width: 100%;
}

.top-bar {
    position: absolute;
    top: 14px;
    left: 14px;
    right: 14px;
    z-index: 500;
    background: #fff;
    border-radius: 10px;
    padding: 11px 16px;
    box-shadow: 0 6px 20px rgba(20,20,50,0.14);
    font-size: 0.86rem;
    color: #374151;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.top-bar button {
    background: transparent;
    color: #e11d48;
    border: 1.5px solid #fecdd3;
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
}

.top-bar button:hover { background: #e11d48; color: #fff; }

@media (max-width: 800px) {
    .passenger-layout { flex-direction: column; height: auto; }
    #sidebar { width: 100%; max-height: 45vh; }
    #mapWrap { height: 55vh; }
}
</style>

</head>

<body>

<div class="passenger-layout">

    <div id="sidebar">
        <h2>🚌 Track Your Bus</h2>

        <h3>🟢 Live Right Now</h3>
        <div id="liveBusList">
            <p class="empty-hint">No buses are currently sharing their location. Ask your driver to start tracking from their panel.</p>
        </div>

        <div class="ai-card">
            <div class="ai-title">🤖 AI Route Assistant <span class="ai-badge">AI</span></div>
            <div class="ai-sub">Tell us where you're going — we'll find the best route.</div>
            <input id="aiFrom" placeholder="From (e.g. Adajan)">
            <input id="aiTo" placeholder="To (e.g. Railway Station)">
            <button id="aiFindBtn" onclick="findBestRoute()">✨ Find Best Route</button>
            <div id="aiResult"></div>
        </div>

        <h3>🗺️ Available Routes</h3>
        <div id="routeList">
            <p class="empty-hint">Loading routes...</p>
        </div>
    </div>

    <div id="mapWrap">
        <div class="top-bar">
            <span id="topBarText">Showing all live buses</span>
            <button onclick="logoutUser()">Logout</button>
        </div>
        <div id="map"></div>
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script src="/vendor/leaflet/leaflet.js"></script>

<script src="/js/passenger.js"></script>

</body>
</html>
