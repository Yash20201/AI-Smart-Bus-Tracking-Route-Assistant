<!DOCTYPE html>
<html>
<head>

<title>Track Your Bus</title>

<link rel="stylesheet"
href="/vendor/leaflet/leaflet.css"/>

<link rel="stylesheet" href="/css/style.css">

<style>
.passenger-layout {
    display: flex;
    height: 100vh;
    width: 100vw;
}

#sidebar {
    width: 320px;
    flex-shrink: 0;
    background: #fff;
    border-right: 1px solid #e5e7eb;
    overflow-y: auto;
    padding: 16px;
}

#sidebar h2 {
    font-size: 1.15rem;
    margin: 0 0 16px;
    background: linear-gradient(135deg, #4f46e5, #06b6d4);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 800;
}

#sidebar h3 {
    font-size: 0.85rem;
    color: #6b7280;
    text-transform: uppercase;
    margin: 18px 0 8px;
}

.route-item {
    padding: 10px 12px;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    margin-bottom: 8px;
    cursor: pointer;
    font-size: 0.9rem;
}

.route-item:hover {
    background: #f4f6f9;
}

.route-item.active {
    border-color: #4f46e5;
    background: #eef2ff;
}

.live-bus-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 6px;
    background: #f0fdf4;
    margin-bottom: 6px;
    font-size: 0.85rem;
}

.live-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #16a34a;
    flex-shrink: 0;
}

.empty-hint {
    color: #6b7280;
    font-size: 0.85rem;
    line-height: 1.5;
}

#mapWrap {
    flex: 1;
    position: relative;
}

#map {
    height: 100%;
    width: 100%;
}

.top-bar {
    position: absolute;
    top: 12px;
    left: 12px;
    right: 12px;
    z-index: 500;
    background: #fff;
    border-radius: 8px;
    padding: 10px 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    font-size: 0.85rem;
    color: #374151;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.top-bar button {
    background: transparent;
    color: #dc2626;
    border: 1px solid #dc2626;
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 0.8rem;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="passenger-layout">

    <div id="sidebar">
        <h2>🚌 Track Your Bus</h2>

        <h3>Live Right Now</h3>
        <div id="liveBusList">
            <p class="empty-hint">No buses are currently sharing their location. Ask your driver to start tracking from their panel.</p>
        </div>

        <h3>Available Routes</h3>
        <div id="routeList">
            <p class="empty-hint">Loading routes...</p>
        </div>
    </div>

    <div id="mapWrap">
        <div class="top-bar">
            <span id="topBarText">Showing all live buses</span>
            <button onclick="logoutUser()">Logout</button>
        </div>
        <div id="map"></div>
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script src="/vendor/leaflet/leaflet.js"></script>

<script src="/js/passenger.js"></script>

</body>
</html>
